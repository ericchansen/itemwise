name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Approve and merge safe Dependabot PRs
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t prs < <(
            gh pr list \
              --repo ericchansen/itemwise \
              --state open \
              --limit 50 \
              --search "author:app/dependabot" \
              --json number,title,mergeStateStatus,reviewDecision,isDraft \
              --jq '.[] | @base64'
          )

          if [ "${#prs[@]}" -eq 0 ]; then
            echo "No open Dependabot PRs."
            exit 0
          fi

          for encoded in "${prs[@]}"; do
            pr_json="$(echo "$encoded" | base64 --decode)"
            number="$(echo "$pr_json" | jq -r '.number')"
            title="$(echo "$pr_json" | jq -r '.title')"
            merge_state="$(echo "$pr_json" | jq -r '.mergeStateStatus')"
            review_decision="$(echo "$pr_json" | jq -r '.reviewDecision')"
            is_draft="$(echo "$pr_json" | jq -r '.isDraft')"

            if [ "$is_draft" = "true" ]; then
              echo "#$number is draft - skipping"
              continue
            fi

            # Skip major updates (e.g. 2.x -> 3.x)
            if [[ "$title" =~ from[[:space:]]+([0-9]+)(\.[0-9]+)*[[:space:]]+to[[:space:]]+([0-9]+)(\.[0-9]+)* ]]; then
              from_major="${BASH_REMATCH[1]}"
              to_major="${BASH_REMATCH[3]}"
              if [ "$to_major" -gt "$from_major" ]; then
                echo "#$number major update ($from_major -> $to_major) - skipping"
                continue
              fi
            fi

            if [ "$review_decision" != "APPROVED" ]; then
              gh pr review "$number" --repo ericchansen/itemwise --approve || true
            fi

            if [ "$merge_state" = "CLEAN" ]; then
              gh pr merge "$number" --repo ericchansen/itemwise --rebase --delete-branch
              echo "#$number merged"
            else
              echo "#$number not ready (merge state: $merge_state) - will retry on next run"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
